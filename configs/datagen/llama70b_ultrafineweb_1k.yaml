# Llama-3.3-70B 1k-doc smoke test. Measures INJ_SCALE, verifies layer-53 extraction,
# ~5k API calls. No cache_from — Llama tokenizer ≠ Gemma, zero reuse.
#
# Prereq: huggingface-cli login (llama-3.3 is gated)
# Run:    python -m nla.datagen.run_pipeline --config configs/datagen/llama70b_ultrafineweb_1k.yaml

model: llama70b  # → layer_index=53, d_model=8192, extractor batch_size=1, device_map=auto
base_model: meta-llama/Llama-3.3-70B-Instruct  # or local path if pre-downloaded
output_dir: /tmp/nla_llama70b_ultrafineweb_1k

corpus:
  name: openbmb/Ultra-FineWeb   # see qwen7b_ultrafineweb_100k.yaml header re: dataset size
  config: null
  split: en
  text_column: content
  start: 0
  length: 1000

stage0:
  positions_per_doc: 10
  chunk_size: 256
  seed: 42
  # multigpu: true conflicts with device_map=auto — stage0_multigpu.sh launches
  # one proc/GPU (CUDA_VISIBLE_DEVICES=$i), but 70B needs multi-GPU shard.
  # Single process with device_map=auto lets accelerate shard across all GPUs.
  multigpu: false
  # Preset has batch_size=1 (single-GPU-with-offload default). With 8 H100s
  # device_map=auto shards weights to ~18GB/GPU leaving ~60GB for activations.
  extractor_kwargs:
    batch_size: 8
    max_length: 4096
    device_map: auto

stage1:
  av_sft_frac: 0.25
  ar_sft_frac: 0.25
  rl_frac: 0.50
  seed: 42

stage2:
  provider_cls: nla.datagen.providers.AnthropicProvider
  provider_kwargs:
    model: claude-sonnet-4-6
    max_tokens: 300
    temperature: 1.0
    concurrency: 20
  chunk_size: 65536

stage3:
  keep_debug_metadata: true

shuffle:
  enabled: true
  seed: 42

storage_cls: nla.datagen.storage.LocalStorage
